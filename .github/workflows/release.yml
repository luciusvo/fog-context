name: Release fog-context MCP Binary

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build_release:
    name: Build ${{ matrix.file_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux x86_64 (static musl - works on any distro) ──────────────
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            file_name: fog-mcp-linux-amd64
            musl: true

          # ── macOS Apple Silicon (M1/M2/M3/M4) ─────────────────────────────
          - os: macos-latest
            target: aarch64-apple-darwin
            file_name: fog-mcp-macos-arm64
            musl: false

          # ── macOS Intel removed: macos-13 runner is unavailable (9h+ wait).
          # Intel Mac users: run `cargo build --release --package fog-mcp-server`
          # or use the ARM64 binary via Rosetta 2 (works transparently on macOS 11+).

          # ── Windows x86_64 ────────────────────────────────────────────────
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            file_name: fog-mcp-windows-amd64.exe
            musl: false
            embed: false

          # ── Embedding Variants (Linux/macOS/Windows) ──────────────────────
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            file_name: fog-mcp-linux-amd64-embed
            musl: true
            embed: true

          - os: macos-latest
            target: aarch64-apple-darwin
            file_name: fog-mcp-macos-arm64-embed
            musl: false
            embed: true

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            file_name: fog-mcp-windows-amd64-embed.exe
            musl: false
            embed: true

    steps:
      - uses: actions/checkout@v4

      # ── Node.js: needed to generate Swift grammar parser.c ────────────────
      - name: Setup Node.js (Swift grammar generation)
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ── Linux musl toolchain ──────────────────────────────────────────────
      - name: Install musl-tools (Linux x86_64)
        if: matrix.musl && !matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools musl-dev g++-x86-64-linux-gnu

      # ── ARM cross-compilation via cross-rs ───────────────────────────────
      - name: Install cross (Linux ARM64)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      # ── Download opt-in C-FFI grammars (Kotlin / Swift / Dart) ───────────
      - name: Fetch and generate extra grammars
        shell: bash
        run: |
          mkdir -p crates/fog-mcp-server/grammars
          cd crates/fog-mcp-server/grammars
          # Kotlin and Dart have parser.c in their github repos
          git clone --depth 1 https://github.com/fwcd/tree-sitter-kotlin.git
          git clone --depth 1 https://github.com/nickel-lang/tree-sitter-dart.git || \
          git clone --depth 1 https://github.com/nielsenko/tree-sitter-dart.git
          # Swift's github repo lacks parser.c, so we download the pre-generated npm package instead
          # This avoids "npx tree-sitter generate" which breaks on Windows CI
          npm pack tree-sitter-swift@0.7.1
          tar -xf tree-sitter-swift-*.tgz
          mv package tree-sitter-swift
          rm tree-sitter-swift-*.tgz

      # ── Rust toolchain ────────────────────────────────────────────────────
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # ── Build (x86_64 Linux ARM uses cross-rs, others use cargo) ─────────
      - name: Build MCP server (x86_64 / macOS / Windows)
        if: '!matrix.cross && !matrix.embed'
        run: cargo build --release --target ${{ matrix.target }} --package fog-mcp-server --features all-langs
        env:
          CARGO_PROFILE_RELEASE_LTO: "thin"
          CARGO_PROFILE_RELEASE_STRIP: "debuginfo"

      - name: Build MCP server with Embedding (x86_64 / macOS / Windows)
        if: '!matrix.cross && matrix.embed'
        run: cargo build --release --target ${{ matrix.target }} --package fog-mcp-server --features "all-langs,embedding"
        env:
          CARGO_PROFILE_RELEASE_LTO: "thin"
          CARGO_PROFILE_RELEASE_STRIP: "debuginfo"

      - name: Build MCP server (ARM64 via cross-rs)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }} --package fog-mcp-server
        # Note: --features all-langs excluded for cross builds (C-FFI needs native toolchain)

      # ── Rename binary ─────────────────────────────────────────────────────
      - name: Rename binary
        shell: bash
        run: |
          SRC="target/${{ matrix.target }}/release/fog-mcp-server"
          mv "${SRC}" "${{ matrix.file_name }}" 2>/dev/null || \
          mv "${SRC}.exe" "${{ matrix.file_name }}" 2>/dev/null || true

      # ── Upload to GitHub Releases ─────────────────────────────────────────
      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.file_name }}
          name: fog-context ${{ github.ref_name }}
          body: |
            ## fog-context ${{ github.ref_name }}

            ### Download

            | Platform | File |
            |:---------|:-----|
            | Linux x86_64 | `fog-mcp-linux-amd64` |
            | macOS Apple Silicon (M1/M2/M3/M4) | `fog-mcp-macos-arm64` |
            | macOS Intel | ⚠️ No pre-built binary - [build from source](https://github.com/luciusvo/fog-context#build-from-source) or use ARM64 via Rosetta 2 |
            | Windows x86_64 | `fog-mcp-windows-amd64.exe` |

            ### Quick Setup (Claude Desktop / Cline)
            ```json
            {
              "mcpServers": {
                "fog-context": {
                  "command": "/path/to/fog-mcp-server",
                  "args": ["--project", "/path/to/your/codebase"]
                }
              }
            }
            ```
          draft: false
